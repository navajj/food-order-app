{% extends "base.html" %}
{% block title %}Login - FoodOrder{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Sign In</h2>

    {% if form.errors %}
    <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" id="id_username" required
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
      </div>
      <div class="mb-6">
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" id="id_password" required
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition">Sign In</button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      Don't have an account? <a href="{% url 'register' %}" class="text-indigo-600 hover:underline font-medium">Register</a>
    </p>
  </div>
</div>
{% endblock %}
