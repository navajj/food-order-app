{% extends "base.html" %}
{% block title %}Cart - FoodOrder{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-8">Your Cart</h1>

<div id="cart-empty" class="hidden text-center py-16">
  <p class="text-gray-500 text-lg mb-4">Your cart is empty.</p>
  <a href="{% url 'restaurant_list' %}" class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition">Browse Restaurants</a>
</div>

<div id="cart-content" class="hidden">
  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wide">
        <tr>
          <th class="px-6 py-3">Item</th>
          <th class="px-6 py-3">Price</th>
          <th class="px-6 py-3">Quantity</th>
          <th class="px-6 py-3">Subtotal</th>
          <th class="px-6 py-3"></th>
        </tr>
      </thead>
      <tbody id="cart-table-body"></tbody>
    </table>
  </div>

  <div class="flex items-center justify-between mt-6">
    <p class="text-xl font-bold text-gray-800">Total: $<span id="cart-total">0.00</span></p>
    <a href="{% url 'checkout' %}" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-indigo-700 transition">Proceed to Checkout</a>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>renderCart();</script>
{% endblock %}
